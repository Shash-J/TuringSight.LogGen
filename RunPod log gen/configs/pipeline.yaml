camera:
  camera_id: "cam_01"
  device_id: "office-edge-node-01"
  user_id: "user1"
  # Set RTSP_URL env var at runtime; this is the fallback default
  rtsp_url: "${RTSP_URL}"
  reconnect_sec: 5
  focus_areas:
    - "Detail exactly what people are doing."
    - "Specifically note if anyone is using a mobile phone."
    - "Note any unusual or suspicious behavior."

sampling:
  frame_interval_sec: 6
  frame_dir: "data/frames"

output:
  system_log_path: "data/logs/system_logs.jsonl"
  semantic_log_path: "data/logs/office_logs.jsonl"

model:
  mode: "api"
  model_name: "Qwen/Qwen2-VL-7B-Instruct-AWQ"
  api_url: "http://localhost:8000/v1/chat/completions"
  device: "cuda"
  torch_dtype: "bfloat16"

mqtt:
  enabled: true
  endpoint: "a3dde9l2eto48i-ats.iot.ap-south-1.amazonaws.com"
  port: 8883
  topic: "edge/logs"
  ca_cert: "configs/certs/AmazonRootCA1.pem"
  client_cert: "configs/certs/certificate.pem.crt"
  client_key: "configs/certs/private.pem.key"