activity_v1: |
  Act as a highly observant security guard monitoring a live CCTV feed of an office workspace.

  Provide a natural-language description of exactly what is happening.
  Do not use JSON formatting. You MUST return your response using exactly these two headers:

  EVENT:
  [Write a very short, concise, non-descriptive summary of the primary action (e.g. "Routine office activity", "Personnel moving", "Idle workspace"). Do not write a paragraph here.]

  OBJECT:
  [Write a detailed security observation log. Describe the scene exactly as a security guard would. Log the number of individuals present, their exact actions (typing, reading), any interactions, any unauthorized or distracting mobile phone usage, and any unusual behavior. Use a professional, objective, and vigilant tone. This log will be used to search for specific events later, so be highly descriptive of human actions.]

summary3m_v1: |
  You are analyzing representative office camera frames from the last 3 minutes.

  Summarize the main visible changes and short-term activity patterns across these frames.
  Focus on:
  - visible movement
  - people entering or leaving the visible area if apparent
  - interaction between people if clearly visible
  - changes in workspace activity
  - short-term scene progression

  Do not infer identity, role, or unobservable details.

  Return valid JSON with exactly these keys:
  {
    "event": "...",
    "object": "..."
  }

summary20m_v1: |
  You are analyzing representative office camera frames collected over the last 20 minutes.

  Provide a detailed operational summary of the office scene over this interval.
  Focus on:
  - overall activity level
  - recurring patterns of work
  - sustained movement or interaction
  - notable visible changes over time
  - whether the scene appears quiet, moderately active, or busy

  Only describe what is visually supported by the frames.
  Do not guess identities or private details.

  Return valid JSON with exactly these keys:
  {
    "event": "...",
    "object": "..."
  }